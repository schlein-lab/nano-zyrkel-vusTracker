name: "ClinVar VUS Tracker"

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download nano-zyrkel binary
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release download --repo christian-schlein/nano-zyrkel \
            --pattern "nano-zyrkel-*-linux*" --dir /tmp/bin || \
          gh release download v0.4.0 --repo christian-schlein/nano-zyrkel \
            --pattern "nano-zyrkel-*-linux*" --dir /tmp/bin || \
          echo "No release binary found — building from source as fallback"

          # If no release binary available, build from source
          if [ ! -f /tmp/bin/nano-zyrkel* ]; then
            echo "Building from source..."
            sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
            git clone --depth 1 https://$GH_TOKEN@github.com/christian-schlein/nano-zyrkel.git /tmp/nano-src
            cd /tmp/nano-src
            rustup default stable
            cargo build --release
            mkdir -p /tmp/bin
            cp target/release/nano-zyrkel /tmp/bin/nano-zyrkel
          fi
          chmod +x /tmp/bin/nano-zyrkel*
          ls -la /tmp/bin/

      - name: Run ClinVar tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BINARY=$(ls /tmp/bin/nano-zyrkel* | head -1)
          $BINARY --config hats/config.json --lang en --verbose

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install + auth Codex CLI
        env:
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
        run: |
          npm install -g @openai/codex
          mkdir -p ~/.codex
          echo "$CODEX_AUTH" > ~/.codex/auth.json

      - name: Generate Story of the Day
        run: |
          RECLASS_FILE="staging/clinvar-tracker/reclassifications.jsonl"
          STORY_FILE="staging/clinvar-tracker/story.txt"
          if [ -s "$RECLASS_FILE" ]; then
            LAST=$(tail -1 "$RECLASS_FILE")
            GENE=$(echo "$LAST" | jq -r '.gene // empty')
            HGVS=$(echo "$LAST" | jq -r '.hgvs // empty' | head -c 50)
            OLD=$(echo "$LAST" | jq -r '.old // empty')
            NEW=$(echo "$LAST" | jq -r '.new // empty')
            if [ -n "$GENE" ] && [ -n "$HGVS" ]; then
              codex exec --skip-git-repo-check --ephemeral \
                -o "$STORY_FILE" \
                "Write a 3-sentence historical note about the ClinVar classification change of $HGVS in gene $GENE from $OLD to $NEW. Include: what disease this gene is associated with, and the clinical significance of this change. Be factual. English only. No markdown."
              echo "Story generated for $GENE"
            fi
          else
            echo "No classification changes yet — skipping story"
          fi

      - name: Commit results
        run: |
          git config user.name "nano-zyrkel"
          git config user.email "nano@zyrkel.local"
          git add staging/
          git diff --staged --quiet || \
            git commit -m "clinvar $(date -u +%Y-%m-%d-%H%M)"
          git push || true
