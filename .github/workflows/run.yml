name: ClinVar VUS Tracker

# vus-tracker has its own native binary (built from this repo's
# Cargo workspace) so it does NOT use the generic data-update reusable
# workflow. The vus-tracker binary calls its own modern ClinVar
# pipeline directly while delegating the rest of the runtime to
# nano-zyrkel-core.

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build vus-tracker binary
        run: cargo build --release --bin vus-tracker

      - name: Run ClinVar tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ./target/release/vus-tracker --config hats/config.json --lang en

      - name: Commit staging changes
        run: |
          git config user.name "vus-tracker"
          git config user.email "vus-tracker@users.noreply.github.com"
          git add staging/
          git diff --staged --quiet || \
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
