name: Build WASM + Deploy Pages

on:
  push:
    paths: ['src/**', 'web/**', 'Cargo.toml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('Cargo.lock') }}

      - name: Install wasm-pack
        run: cargo install wasm-pack || true

      - name: Build WASM
        run: wasm-pack build --target web --out-dir web/pkg --features wasm --no-default-features

      - name: Prepare GitHub Pages
        run: |
          mkdir -p pages/pkg pages/data
          cp web/index.html web/app.js web/style.css web/sw.js pages/
          cp web/pkg/vus_tracker_lib_bg.wasm pages/pkg/
          cp web/pkg/vus_tracker_lib.js pages/pkg/
          # Copy small data files
          cp staging/clinvar-tracker/index.json pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/reclassifications.jsonl pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/story.txt pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/daily_stats.jsonl pages/data/ 2>/dev/null || true

          # Filter out CNVs and multi-gene entries (contain semicolons or "subset of")
          if [ -f staging/clinvar-tracker/variants.jsonl ]; then
            echo "Filtering CNVs and multi-gene entries..."
            grep -v '"gene":"subset of' staging/clinvar-tracker/variants.jsonl \
              | grep -v '"gene":"[^"]*;' \
              > /tmp/variants_clean.jsonl
            CLEAN=$(wc -l < /tmp/variants_clean.jsonl)
            echo "Clean single-gene variants: $CLEAN"

            # Sort by last_evaluated date (ISO format after backfill normalization)
            echo "Sorting by date..."
            sort -t'"' -k1,1 -r /tmp/variants_clean.jsonl > /tmp/variants_sorted.jsonl

            # today.jsonl: 500 most recent variants (instant load, ~200 KB)
            head -500 /tmp/variants_sorted.jsonl > pages/data/today.jsonl
            echo "Today file: $(wc -l < pages/data/today.jsonl) variants"

            # Extract key genes as separate files (full data per gene)
            for GENE in LDLR BRCA1 BRCA2 TP53 ATM TTN NF1 MLH1 MSH2 CFTR MYH7 PALB2 SCN5A FBN1 APC; do
              grep "\"gene\":\"$GENE\"" /tmp/variants_clean.jsonl > "pages/data/gene_${GENE}.jsonl" 2>/dev/null || true
              COUNT=$(wc -l < "pages/data/gene_${GENE}.jsonl" 2>/dev/null || echo 0)
              echo "  $GENE: $COUNT variants"
            done

            # Main variants: 10k most recent (background load, ~3 MB)
            head -10000 /tmp/variants_sorted.jsonl > pages/data/variants.jsonl
            echo "Main load: $(wc -l < pages/data/variants.jsonl) variants"
          fi

          echo "Pages data sizes:" && du -sh pages/data/*

      - name: Deploy to gh-pages branch
        run: |
          cd pages
          git init
          git config user.name "nano-zyrkel"
          git config user.email "nano@zyrkel.local"
          git add -A
          git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" master:gh-pages
