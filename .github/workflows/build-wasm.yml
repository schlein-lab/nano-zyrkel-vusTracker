name: Build WASM + Deploy Pages

on:
  push:
    paths: ['src/**', 'web/**', 'Cargo.toml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('Cargo.lock') }}

      - name: Install wasm-pack
        run: cargo install wasm-pack || true

      - name: Build WASM
        run: wasm-pack build --target web --out-dir web/pkg --features wasm --no-default-features

      - name: Prepare GitHub Pages
        run: |
          mkdir -p pages/pkg pages/data/chunks
          cp web/index.html web/app.js web/style.css web/sw.js pages/
          cp web/pkg/vus_tracker_lib_bg.wasm pages/pkg/
          cp web/pkg/vus_tracker_lib.js pages/pkg/
          # Copy small data files
          cp staging/clinvar-tracker/index.json pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/reclassifications.jsonl pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/story.txt pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/daily_stats.jsonl pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/feed.xml pages/ 2>/dev/null || true

          # Filter out CNVs and multi-gene entries (contain semicolons or "subset of")
          if [ -f staging/clinvar-tracker/variants.jsonl ]; then
            echo "Filtering CNVs and multi-gene entries..."
            grep -v '"gene":"subset of' staging/clinvar-tracker/variants.jsonl \
              | grep -v '"gene":"[^"]*;' \
              > /tmp/variants_clean.jsonl
            CLEAN=$(wc -l < /tmp/variants_clean.jsonl)
            echo "Clean single-gene variants: $CLEAN"

            # Sort by gene name (alphabetically) for balanced chunking
            echo "Sorting by gene name..."
            python3 -c "
import json, sys
lines = open('/tmp/variants_clean.jsonl').readlines()
lines.sort(key=lambda l: json.loads(l).get('gene', ''))
with open('/tmp/variants_sorted_by_gene.jsonl', 'w') as f:
    f.writelines(lines)
"
            TOTAL=$(wc -l < /tmp/variants_sorted_by_gene.jsonl)
            echo "Total sorted variants: $TOTAL"

            # Split into chunks of ~200,000 lines each
            CHUNK_SIZE=200000
            split -l $CHUNK_SIZE -d -a 2 /tmp/variants_sorted_by_gene.jsonl /tmp/chunk_
            IDX=0
            for PART in /tmp/chunk_*; do
              DEST=$(printf "pages/data/chunks/chunk_%02d.jsonl" $IDX)
              mv "$PART" "$DEST"
              IDX=$((IDX + 1))
            done
            echo "Created $IDX chunk(s) of up to $CHUNK_SIZE lines each"

            # Log chunk sizes
            echo "Chunk sizes:"
            for F in pages/data/chunks/chunk_*.jsonl; do
              echo "  $(basename $F): $(wc -l < $F) lines, $(du -sh $F | cut -f1)"
            done
          fi

          echo "Pages data sizes:" && du -sh pages/data/* pages/data/chunks/* 2>/dev/null || true

      - name: Deploy to gh-pages branch
        run: |
          cd pages
          git init
          git config user.name "nano-zyrkel"
          git config user.email "nano@zyrkel.local"
          git add -A
          git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" master:gh-pages
