name: Build WASM + Deploy Pages

on:
  push:
    paths: ['src/**', 'web/**', 'Cargo.toml', '.github/workflows/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false  # LFS budget exceeded — chunks generated from NCBI data, not LFS

      - name: Install Rust + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('Cargo.lock') }}

      - name: Install wasm-pack
        run: cargo install wasm-pack || true

      - name: Build WASM
        run: wasm-pack build --target web --out-dir web/pkg --features wasm --no-default-features

      - name: Prepare GitHub Pages
        run: |
          mkdir -p pages/pkg pages/data/chunks
          cp web/index.html web/app.js web/style.css web/sw.js pages/
          cp web/pkg/vus_tracker_lib_bg.wasm pages/pkg/
          cp web/pkg/vus_tracker_lib.js pages/pkg/
          # Copy small data files
          cp staging/clinvar-tracker/index.json pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/reclassifications.jsonl pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/story.txt pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/daily_stats.jsonl pages/data/ 2>/dev/null || true
          cp staging/clinvar-tracker/feed.xml pages/ 2>/dev/null || true

          # Generate chunks from variants.jsonl (only if real file, not LFS pointer)
          if [ -f staging/clinvar-tracker/variants.jsonl ] && head -1 staging/clinvar-tracker/variants.jsonl | grep -q '"gene"'; then
            echo "Real variants.jsonl found — generating chunks..."
            grep -v '"gene":"subset of' staging/clinvar-tracker/variants.jsonl \
              | grep -v '"gene":"[^"]*;' \
              > /tmp/variants_clean.jsonl
            CLEAN=$(wc -l < /tmp/variants_clean.jsonl)
            echo "Clean variants: $CLEAN"
            python3 -c "import json; lines=open('/tmp/variants_clean.jsonl').readlines(); lines.sort(key=lambda l: json.loads(l).get('gene','')); open('/tmp/variants_sorted.jsonl','w').writelines(lines)"
            split -l 200000 -d -a 2 /tmp/variants_sorted.jsonl /tmp/chunk_
            IDX=0
            for PART in /tmp/chunk_*; do
              mv "$PART" "$(printf 'pages/data/chunks/chunk_%02d.jsonl' $IDX)"
              IDX=$((IDX + 1))
            done
            echo "Created $IDX chunks"
          else
            echo "No real variants.jsonl — skipping chunks (existing data on gh-pages preserved)"
          fi

      - name: Deploy to gh-pages branch
        run: |
          # Clone existing gh-pages to preserve data files (chunks, index, etc.)
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" deploy \
            || mkdir deploy
          cd deploy
          git config user.name "nano-zyrkel"
          git config user.email "nano@zyrkel.local"

          # Update frontend + WASM (always)
          cp ../pages/index.html ../pages/app.js ../pages/style.css . 2>/dev/null || true
          cp ../pages/sw.js . 2>/dev/null || true
          mkdir -p pkg
          cp ../pages/pkg/* pkg/ 2>/dev/null || true

          # Update data files only if they exist in this build
          if [ -d ../pages/data ]; then
            cp -r ../pages/data/* data/ 2>/dev/null || true
          fi
          if [ -f ../pages/feed.xml ]; then
            cp ../pages/feed.xml . 2>/dev/null || true
          fi

          git add -A
          git diff --staged --quiet || git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
