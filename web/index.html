<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nano-zyrkel-vusTracker live</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>nano-zyrkel-vusTracker</h1>
      <span class="badge live">live</span>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search gene/variant..." autocomplete="off">
        <div class="autocomplete" id="autocomplete"></div>
      </div>
      <input type="date" id="report-date" title="Report date -- what changed since?">
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="big-number" id="total-variants">---</div>
    <div class="subtitle">
      <span id="delta">loading...</span> ·
      <span id="trend"></span>
    </div>
  </div>

  <!-- Time Range -->
  <div class="time-bar">
    <button class="tb active" onclick="setRange('7d')">7d</button>
    <button class="tb" onclick="setRange('1m')">1m</button>
    <button class="tb" onclick="setRange('1y')">1y</button>
    <button class="tb" onclick="setRange('5y')">5y</button>
    <button class="tb" onclick="setRange('all')">All</button>
  </div>

  <!-- Gene Focus -->
  <div class="gene-focus" id="gene-focus">
    <div class="focus-header">
      <span class="focus-gene-name" id="focus-gene-name">LDLR</span>
      <span class="focus-source" id="focus-source"></span>
    </div>
    <div id="focus-stats" class="focus-row"></div>
    <div id="focus-donut" class="focus-donut"></div>
    <div id="focus-donut-detail" style="margin-top:4px;"></div>
  </div>

  <!-- Filters -->
  <div class="filter-bar" id="filter-bar">
    <div class="filter-chips" id="filter-chips">
      <button class="filter-chip active" data-class="0" onclick="toggleClass(0)">Path</button>
      <button class="filter-chip active" data-class="1" onclick="toggleClass(1)">LP</button>
      <button class="filter-chip active" data-class="2" onclick="toggleClass(2)">VUS</button>
      <button class="filter-chip active" data-class="3" onclick="toggleClass(3)">LB</button>
      <button class="filter-chip active" data-class="4" onclick="toggleClass(4)">Ben</button>
      <button class="filter-chip active" data-class="5" onclick="toggleClass(5)">Confl</button>
    </div>
    <div class="sort-controls">
      <button class="sort-btn" onclick="setSort('date')">Date</button>
      <button class="sort-btn" onclick="setSort('classification')">Class</button>
      <button class="sort-btn" onclick="setSort('hgvs')">HGVS</button>
      <button class="sort-btn" onclick="setSort('gene')">Gene</button>
    </div>
  </div>

  <!-- Loading indicator -->
  <div class="loading" id="loading" style="display:none;">
    <span class="loading-text" id="loading-text">loading...</span>
  </div>

  <!-- Expandable detail section -->
  <div class="detail-section" id="detail-section">
    <!-- Variant list (scrollable, shown when gene loaded) -->
    <div class="variant-list" id="variant-list"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab(0)">Genes</button>
      <button class="tab" onclick="showTab(1)">Changes</button>
      <button class="tab" onclick="showTab(2)">Stats</button>
      <button class="tab" onclick="showTab(3)">VCF</button>
    </div>

    <div class="tab-content active" id="tab0">
      <div id="gene-list" class="list"></div>
    </div>

    <div class="tab-content" id="tab1">
      <div id="changes-list" class="list"></div>
    </div>

    <div class="tab-content" id="tab2">
      <div id="stats-list" class="list"></div>
    </div>

    <div class="tab-content" id="tab3">
      <div class="vcf-drop" id="vcf-drop">
        <div class="vcf-icon">VCF</div>
        <div>Drop VCF here or <label for="vcf-input" class="vcf-link">browse</label></div>
        <input type="file" id="vcf-input" accept=".vcf,.vcf.gz" style="display:none">
      </div>
      <div id="vcf-results" class="list" style="display:none;"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-actions">
      <select id="export-what" class="export-select">
        <option value="focus">Current gene</option>
        <option value="changes">Classification changes</option>
        <option value="top">Top 50 genes</option>
        <option value="all">All gene breakdowns</option>
      </select>
      <button class="export-btn" onclick="doExport('csv')">CSV</button>
      <button class="export-btn" onclick="doExport('tsv')">TSV</button>
      <button class="export-btn" onclick="doExport('xls')">Excel</button>
      <button class="export-btn" onclick="shareLink()">Share</button>
    </div>
    <div class="disclaimer">
      Research use only. Data: <a href="https://www.ncbi.nlm.nih.gov/clinvar/">ClinVar</a>.
    </div>
    <span>nano-zyrkel · <a href="https://zyrkel.com">zyrkel.com</a></span>
  </div>
</div>

<script type="module" src="app.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
