<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nano-zyrkel-vusTracker live</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>nano-zyrkel-vusTracker</h1>
      <span class="badge live">live</span>
    </div>
    <div class="header-right">
      <input type="text" id="search" placeholder="Gene..." autocomplete="off">
      <input type="date" id="report-date" title="Report date — what changed since?">
    </div>
  </div>

  <!-- Hero: Big Number + Gene Focus -->
  <div class="hero">
    <div class="big-number" id="total-variants">—</div>
    <div class="subtitle">
      <span id="delta">loading...</span> ·
      <span id="trend"></span>
    </div>
  </div>

  <!-- Story of the Day (LLM-generated, hidden if empty) -->
  <div class="story" id="story" style="display:none;">
    <div class="story-label">Story of the Day</div>
    <div class="story-text" id="story-text"></div>
  </div>

  <!-- Gene Focus (default: LDLR) — always visible, changes on search -->
  <div class="gene-focus" id="gene-focus">
    <div class="focus-gene-name" id="focus-gene-name">LDLR</div>
    <div id="focus-stats" class="focus-row"></div>
  </div>

  <!-- Time Range -->
  <div class="time-bar">
    <button class="tb active" onclick="setRange('7d')">7d</button>
    <button class="tb" onclick="setRange('1m')">1m</button>
    <button class="tb" onclick="setRange('1y')">1y</button>
    <button class="tb" onclick="setRange('5y')">5y</button>
    <button class="tb" onclick="setRange('all')">All</button>
  </div>

  <!-- Expandable detail section (hidden by default in embed mode) -->
  <div class="detail-section" id="detail-section">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab(0)">Latest</button>
      <button class="tab" onclick="showTab(1)">Genes</button>
      <button class="tab" onclick="showTab(2)">Changes</button>
      <button class="tab" onclick="showTab(3)">Stats</button>
      <button class="tab" onclick="showTab(4)">VCF</button>
    </div>

    <div class="tab-content active" id="tab0">
      <div id="reclass-list" class="list"></div>
    </div>

    <div class="tab-content" id="tab1">
      <div id="gene-list" class="list"></div>
    </div>

    <div class="tab-content" id="tab2">
      <div id="vus-list" class="list"></div>
    </div>

    <div class="tab-content" id="tab3">
      <div id="stats-list" class="list"></div>
      <div id="survival-chart"></div>
    </div>

    <div class="tab-content" id="tab4">
      <div class="vcf-drop" id="vcf-drop">
        <div class="vcf-icon">VCF</div>
        <div>Drop VCF here or <label for="vcf-input" class="vcf-link">browse</label></div>
        <input type="file" id="vcf-input" accept=".vcf,.vcf.gz" style="display:none">
      </div>
      <div id="vcf-results" class="list" style="display:none;"></div>
    </div>

    <select id="panel-select" style="display:none;">
      <option value="">Custom panel...</option>
    </select>
  </div>

  <!-- Disclaimer -->
  <div class="disclaimer">
    Research use only. Classification changes are uncurated computational observations.
    Data: <a href="https://www.ncbi.nlm.nih.gov/clinvar/" style="color:#94a3b8">NCBI ClinVar</a>.
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>nano-zyrkel · <a href="https://zyrkel.com">zyrkel.com</a></span>
    <div class="footer-actions">
      <select id="export-what" class="export-select">
        <option value="focus">Current gene</option>
        <option value="changes">Classification changes</option>
        <option value="top">Top 50 genes</option>
        <option value="all">All gene breakdowns</option>
      </select>
      <button class="export-btn" onclick="doExport('csv')">CSV</button>
      <button class="export-btn" onclick="doExport('tsv')">TSV</button>
      <button class="export-btn" onclick="doExport('xls')">Excel</button>
      <button class="export-btn" onclick="shareLink()">Share</button>
    </div>
    <span class="privacy">Genomic data never leaves your browser.</span>
  </div>
</div>

<script type="module" src="app.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
